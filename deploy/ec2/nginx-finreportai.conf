# /etc/nginx/sites-available/finreportai
# api.finreportai.com → FastAPI (Docker :8000)

server {
    listen 80;
    listen [::]:80;
    server_name api.finreportai.com;

    # Excel bulk import + PDF uploads
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # AR bulk import classifies each row via Claude — can exceed 60s
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}

# HTTPS (certbot usually manages this block after: certbot --nginx -d api.finreportai.com)
# If you already have a listen 443 ssl server, copy the same
# client_max_body_size + proxy_*_timeout values into that block.
