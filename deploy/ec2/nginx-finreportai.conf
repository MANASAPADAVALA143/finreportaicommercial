# /etc/nginx/sites-available/finreportai
# Replace YOUR_EC2_PUBLIC_IP or use api.gnanova.pro after DNS + certbot.

server {
    listen 80;
    server_name YOUR_EC2_PUBLIC_IP;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# Multi-project on same EC2 (optional):
# server { listen 80; server_name estatecfo.gnanova.pro; location / { proxy_pass http://127.0.0.1:8001; ... } }
# server { listen 80; server_name ifrs.gnanova.pro;      location / { proxy_pass http://127.0.0.1:8002; ... } }
