# Stand-alone Postgres for local dev (matches env.example credentials).
# From backend/: docker compose -f docker-compose.postgres.yml up -d
services:
  postgres:
    image: postgres:15-alpine
    container_name: cfo_postgres_local
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finreportai
    ports:
      - "5432:5432"
    volumes:
      - cfo_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  cfo_pg_data:
