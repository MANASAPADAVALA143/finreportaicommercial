services:
  backend:
    build:
      # Repo root so Dockerfile can COPY scripts/ into the image
      context: ..
      dockerfile: backend/Dockerfile
    container_name: finreportai-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
